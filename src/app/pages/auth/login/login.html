<div class="container py-5 mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card border-0 shadow-sm rounded-0">
        <div class="card-body p-5">
          <h2 class="fw-bolder mb-4 text-center letter-spacing-tight">STUDIO.</h2>
          <h5 class="fw-semibold mb-4 text-center">Welcome Back</h5>
          
          <div *ngIf="error" class="alert alert-danger rounded-0 fs-7 border-0">{{ error }}</div>
          
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label fs-8 fw-semibold text-uppercase letter-spacing-wide text-muted">Email Address</label>
              <input type="email" class="form-control rounded-0 py-2 shadow-none border-secondary" formControlName="email" placeholder="name@example.com">
              <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-danger fs-8 mt-1">
                Valid email is required.
              </div>
            </div>
            
            <div class="mb-4">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label fs-8 fw-semibold text-uppercase letter-spacing-wide text-muted m-0">Password</label>
                <a href="#" class="fs-8 text-muted text-decoration-none">Forgot?</a>
              </div>
              <input type="password" class="form-control rounded-0 py-2 shadow-none border-secondary" formControlName="password" placeholder="••••••••">
              <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-danger fs-8 mt-1">
                Password must be at least 6 characters.
              </div>
            </div>
            
            <button type="submit" class="btn btn-dark w-100 rounded-0 py-3 text-uppercase fw-bold fs-7 mb-4" [disabled]="isLoading">
              {{ isLoading ? 'Signing In...' : 'Sign In' }}
            </button>
          </form>
          
          <p class="text-center text-muted fs-7 mb-0">
            Don't have an account? <a routerLink="/auth/register" class="text-dark fw-semibold text-decoration-underline">Register</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
