<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light px-3 mt-5">
  <div class="card border-0 rounded-0 shadow-sm" style="max-width: 450px; width: 100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="fw-bolder letter-spacing-tight mb-2">Create New Password</h2>
        <p class="text-muted fs-7">Please enter your new password below.</p>
      </div>

      <div *ngIf="errorMessage()" class="alert alert-danger rounded-0 border-0 fs-8 py-2 mb-4">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage() }}
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-bold text-uppercase fs-8 letter-spacing-wide">New Password</label>
          <input type="password" class="form-control form-control-lg rounded-0 border-dark px-3 py-2" 
                 formControlName="password" placeholder="Min 6 characters">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold text-uppercase fs-8 letter-spacing-wide">Confirm Password</label>
          <input type="password" class="form-control form-control-lg rounded-0 border-dark px-3 py-2" 
                 formControlName="confirmPassword" placeholder="Confirm your password">
          <div class="text-danger fs-8 mt-1" *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched">
            Passwords do not match.
          </div>
        </div>

        <button type="submit" class="btn btn-dark w-100 rounded-0 py-3 text-uppercase fw-bold fs-7 mb-3"
                [disabled]="resetForm.invalid || isLoading() || !token">
          <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
