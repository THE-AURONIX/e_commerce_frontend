<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light px-3 mt-5">
  <div class="card border-0 rounded-0 shadow-sm" style="max-width: 450px; width: 100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="fw-bolder letter-spacing-tight mb-2">Reset Password</h2>
        <p class="text-muted fs-7">Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      <div *ngIf="errorMessage()" class="alert alert-danger rounded-0 border-0 fs-8 py-2 mb-4">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage() }}
      </div>

      <div *ngIf="successMessage()" class="alert alert-success rounded-0 border-0 fs-8 py-2 mb-4">
        <i class="bi bi-check-circle me-2"></i>{{ successMessage() }}
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage()">
        <div class="mb-4">
          <label class="form-label fw-bold text-uppercase fs-8 letter-spacing-wide">Email Address</label>
          <input type="email" class="form-control form-control-lg rounded-0 border-dark px-3 py-2" 
                 formControlName="email" placeholder="name@example.com">
          <div class="text-danger fs-8 mt-1" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
            Please enter a valid email.
          </div>
        </div>

        <button type="submit" class="btn btn-dark w-100 rounded-0 py-3 text-uppercase fw-bold fs-7 mb-3"
                [disabled]="forgotForm.invalid || isLoading()">
          <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Send Reset Link
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="text-muted fs-7 mb-0">Remembered your password? <a routerLink="/auth/login" class="text-dark fw-bold text-decoration-none">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
