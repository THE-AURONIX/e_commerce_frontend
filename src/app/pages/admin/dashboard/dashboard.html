<div class="container py-5 mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bolder letter-spacing-tight">Admin Dashboard</h2>
    <button class="btn btn-outline-danger rounded-0 px-4" (click)="logout()">Logout</button>
  </div>
  
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-0 p-4 bg-dark text-white">
        <h6 class="text-uppercase letter-spacing-wide fs-8 text-white-50 mb-3">Total Sales</h6>
        <h3 class="fw-bold m-0">{{ 24500 | currency:'INR' }}</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-0 p-4 bg-light">
        <h6 class="text-uppercase letter-spacing-wide fs-8 text-muted mb-3">Active Users</h6>
        <h3 class="fw-bold m-0">1,204</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-0 p-4 bg-light">
        <h6 class="text-uppercase letter-spacing-wide fs-8 text-muted mb-3">Pending Orders</h6>
        <h3 class="fw-bold m-0">45</h3>
      </div>
    </div>
  </div>
</div>
