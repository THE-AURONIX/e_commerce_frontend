<div class="container py-5 mt-5">
  <div class="row">
    <div class="col-md-4 col-lg-3 mb-4">
      <div class="card border-0 shadow-sm rounded-0 p-4 text-center">
        <div class="rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 100px; height: 100px;">
          <i class="bi bi-person fs-1 text-muted"></i>
        </div>
        <h5 class="fw-bold mb-1">{{ user()?.firstName }} {{ user()?.lastName }}</h5>
        <p class="text-muted fs-7 mb-4">{{ user()?.email }}</p>
        <button class="btn btn-outline-danger w-100 rounded-0" (click)="logout()">Logout</button>
      </div>
    </div>
    <div class="col-md-8 col-lg-9">
      <div class="card border-0 shadow-sm rounded-0 p-4 mb-4">
        <h4 class="fw-bolder letter-spacing-tight mb-4">Account Details</h4>
        <div class="row g-3">
          <div class="col-sm-6">
            <label class="form-label fs-8 text-muted text-uppercase letter-spacing-wide">Phone Number</label>
            <p class="fw-medium">{{ user()?.phone }}</p>
          </div>
          <div class="col-sm-6">
            <label class="form-label fs-8 text-muted text-uppercase letter-spacing-wide">Role</label>
            <p class="fw-medium text-capitalize">{{ user()?.role }}</p>
          </div>
        </div>
      </div>
      
      <div class="card border-0 shadow-sm rounded-0 p-4">
        <h4 class="fw-bolder letter-spacing-tight mb-4">Recent Orders</h4>
        <p class="text-muted fs-7">You haven't placed any orders yet.</p>
        <a href="/" class="btn btn-dark rounded-0 px-4 mt-2">Start Shopping</a>
      </div>
    </div>
  </div>
</div>
