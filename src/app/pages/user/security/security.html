<div>
  <h4 class="fw-bolder mb-4 letter-spacing-tight">Security Settings</h4>
  <p class="text-muted fs-7 mb-4 pb-3 border-bottom">Update your password to keep your account secure.</p>

  <div *ngIf="errorMessage()" class="alert alert-danger rounded-0 border-0 fs-8 py-2 mb-4">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage() }}
  </div>

  <div *ngIf="successMessage()" class="alert alert-success rounded-0 border-0 fs-8 py-2 mb-4">
    <i class="bi bi-check-circle me-2"></i>{{ successMessage() }}
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <div class="row g-4 mb-4">
      <div class="col-md-12">
        <label class="form-label fw-bold text-uppercase fs-8 letter-spacing-wide">Current Password</label>
        <input type="password" class="form-control form-control-lg rounded-0 border-dark px-3 py-2 fs-7" formControlName="currentPassword" style="max-width: 400px;">
      </div>
      <div class="col-md-12">
        <label class="form-label fw-bold text-uppercase fs-8 letter-spacing-wide">New Password</label>
        <input type="password" class="form-control form-control-lg rounded-0 border-dark px-3 py-2 fs-7" formControlName="newPassword" style="max-width: 400px;">
      </div>
      <div class="col-md-12">
        <label class="form-label fw-bold text-uppercase fs-8 letter-spacing-wide">Confirm New Password</label>
        <input type="password" class="form-control form-control-lg rounded-0 border-dark px-3 py-2 fs-7" formControlName="confirmPassword" style="max-width: 400px;">
        <div class="text-danger fs-8 mt-1" *ngIf="passwordForm.errors?.['mismatch'] && passwordForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-dark rounded-0 px-5 py-3 text-uppercase fw-bold fs-7" [disabled]="passwordForm.invalid || isLoading()">
      <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      Update Password
    </button>
  </form>
</div>
