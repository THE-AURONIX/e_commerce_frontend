<div>
  <div class="mb-4 pb-3 border-bottom">
    <h4 class="fw-bolder letter-spacing-tight mb-1">My Wishlist</h4>
    <p class="text-muted fs-7 mb-0">Products you've saved for later.</p>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" *ngIf="wishlist().length > 0; else noWishlist">
    <div class="col" *ngFor="let item of wishlist()">
      <app-product-card [product]="item.product"></app-product-card>
    </div>
  </div>

  <ng-template #noWishlist>
    <div class="text-center py-5">
      <i class="bi bi-heart fs-1 text-muted mb-3 d-block"></i>
      <h6 class="fw-bold mb-2">Your wishlist is empty.</h6>
      <p class="text-muted fs-7 mb-4">Save items you love so you don't lose track of them.</p>
      <a routerLink="/products" class="btn btn-dark rounded-0 px-4">Discover Products</a>
    </div>
  </ng-template>
</div>
