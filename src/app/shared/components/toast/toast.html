<div class="toast-container position-fixed top-0 end-0 p-3 z-3" style="pointer-events: none;">
  <div *ngFor="let toast of toastService.toasts()" class="toast show align-items-center text-white border-0 mb-2 shadow-lg animate-toast pe-auto" role="alert" aria-live="assertive" aria-atomic="true"
       [ngClass]="{
         'bg-success': toast.type === 'success',
         'bg-danger': toast.type === 'error',
         'bg-dark': toast.type === 'info'
       }">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center gap-2 fw-medium fs-7">
        <i class="bi" [ngClass]="{
          'bi-check-circle-fill': toast.type === 'success',
          'bi-exclamation-circle-fill': toast.type === 'error',
          'bi-info-circle-fill': toast.type === 'info'
        }"></i>
        {{ toast.message }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" aria-label="Close" (click)="toastService.remove(toast.id)"></button>
    </div>
  </div>
</div>
