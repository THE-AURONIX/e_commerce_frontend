<div class="admin-wrapper d-flex">
  <!-- Sidebar -->
  <aside class="admin-sidebar bg-dark text-white min-vh-100 p-3 shadow-sm d-flex flex-column">
    <div class="sidebar-header mb-4 text-center">
      <h4 class="fw-bolder m-0 py-2 letter-spacing-tight border-bottom border-secondary">
        Admin<span class="text-primary">Panel</span>
      </h4>
    </div>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-link text-white py-3 px-3 mb-2 rounded-3 d-flex align-items-center">
          <i class="bi bi-speedometer2 me-3 fs-5"></i> Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/products" routerLinkActive="active" class="nav-link text-white py-3 px-3 mb-2 rounded-3 d-flex align-items-center">
          <i class="bi bi-box-seam me-3 fs-5"></i> Products
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/categories" routerLinkActive="active" class="nav-link text-white py-3 px-3 mb-2 rounded-3 d-flex align-items-center">
          <i class="bi bi-tags me-3 fs-5"></i> Categories
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/coupons" routerLinkActive="active" class="nav-link text-white py-3 px-3 mb-2 rounded-3 d-flex align-items-center">
          <i class="bi bi-percent me-3 fs-5"></i> Coupons
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/reviews" routerLinkActive="active" class="nav-link text-white py-3 px-3 mb-2 rounded-3 d-flex align-items-center">
          <i class="bi bi-star me-3 fs-5"></i> Reviews
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/orders" routerLinkActive="active" class="nav-link text-white py-3 px-3 mb-2 rounded-3 d-flex align-items-center">
          <i class="bi bi-cart-check me-3 fs-5"></i> Orders
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/users" routerLinkActive="active" class="nav-link text-white py-3 px-3 mb-2 rounded-3 d-flex align-items-center">
          <i class="bi bi-people me-3 fs-5"></i> Users
        </a>
      </li>
    </ul>
    
    <hr class="border-secondary">
    <div class="sidebar-footer">
      <a routerLink="/" class="nav-link text-white-50 py-2 d-flex align-items-center">
        <i class="bi bi-house me-3 fs-5"></i> Back to Store
      </a>
      <button (click)="logout()" class="btn btn-outline-danger w-100 mt-3 d-flex align-items-center justify-content-center">
        <i class="bi bi-box-arrow-right me-2"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="admin-main flex-grow-1 bg-light min-vh-100 d-flex flex-column">
    <!-- Topbar -->
    <header class="admin-topbar bg-white shadow-sm p-3 d-flex justify-content-between align-items-center">
      <h5 class="m-0 fw-bold text-dark">Admin Area</h5>
      <div class="user-profile d-flex align-items-center">
        <span class="me-3 fw-medium text-muted">Administrator</span>
        <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center" style="width: 40px; height: 40px;">
          A
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="admin-content p-4 flex-grow-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
